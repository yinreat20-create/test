<html lang="tr">

    <meta charset="utf-8"/>

        body { background-color: #F8F9FA; color: #0A1931; -webkit-tap-highlight-color: transparent; }
        .premium-shadow { box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .mobile-touch-active:active { transform: scale(0.97); opacity: 0.95; }
        
        .hero-section {
            background-image: url('https://images.unsplash.com/photo-1619405399517-d7fce0f13302?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            position: relative;
        }
        
        .hero-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(10,25,49,0.7) 0%, rgba(10,25,49,0.85) 100%);
            pointer-events: none;
            z-index: 0;
        }
        
        .hero-section > * { position: relative; z-index: 1; }
        
        /* Gizli scrollbar tasarımı */

        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

<body class="font-sans antialiased select-none md:select-text">
<div id="root"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyC8JHwiUcHlJpoiFewsaCzSBRS8SFU-A48",
        authDomain: "viptransfer-65c5e.firebaseapp.com",
        projectId: "viptransfer-65c5e",
        storageBucket: "viptransfer-65c5e.firebasestorage.app",
        messagingSenderId: "279013861180",
        appId: "1:279013861180:web:2193543a98d147a1e42039",
        measurementId: "G-24V8G9KF3B"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    window.FirebaseBridge = { auth, db, signInWithEmailAndPassword, signOut, onAuthStateChanged, doc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc };
</script>

<script type="text/babel">
    const { useState, useEffect } = React;

    // --- MOBİL İNDİRME BUTONU BİLEŞENİ ---
    function InstallButton() {
        const [deferredPrompt, setDeferredPrompt] = useState(null);
        const [isIOS, setIsIOS] = useState(false);
        const [isStandalone, setIsStandalone] = useState(false);

        useEffect(() => {
            if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
                setIsStandalone(true);
                return;
            }
            const userAgent = window.navigator.userAgent.toLowerCase();
            if (/iphone|ipad|ipod/.test(userAgent)) {
                setIsIOS(true);
            }
            const handleBeforeInstallPrompt = (e) => {
                e.preventDefault();
                setDeferredPrompt(e);
            };
            window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
        }, []);

        const handleInstallClick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') setDeferredPrompt(null);
            } else if (isIOS) {
                alert("iPhone'da uygulamayı indirmek için:\n\n1. Alt menüdeki 'Paylaş' ikonuna dokunun.\n2. Çıkan menüde 'Ana Ekrana Ekle' seçeneğini seçin.");
            }
        };

        if (isStandalone || (!deferredPrompt && !isIOS)) return null;

        return (
            <div className="fixed bottom-4 left-4 right-4 z-50 sm:hidden">
                <div className="bg-brand-navy p-3 rounded-xl shadow-2xl flex items-center justify-between border border-brand-navy/20">
                    <div className="flex flex-col">
                        <span className="text-white text-sm font-bold font-montserrat">Silopi Sahibinden</span>
                        <span className="text-gray-300 text-[10px]">Uygulamamızı telefonuna kur!</span>
                    </div>
                    <button onClick={handleInstallClick} className="bg-brand-red text-white text-xs font-bold px-4 py-2 rounded-lg hover:bg-red-700 transition-colors shadow-sm">
                        İNDİR
                    </button>
                </div>
            </div>
        );
    }

    // --- MOBİL UYUMLU İLAN KARTI BİLEŞENİ ---
    function ListingCard({ listing, onClick }) {
        return (
            <div onClick={onClick} className="flex flex-row sm:flex-col gap-3 sm:gap-4 p-2.5 sm:p-4 bg-white rounded-xl border border-gray-200 hover:shadow-md hover:border-brand-navy/30 transition-all cursor-pointer mb-3 sm:mb-0">
                <div className="w-[120px] h-24 sm:w-full sm:h-48 shrink-0 relative rounded-lg overflow-hidden bg-gray-100">
                    <img 
                        src={listing.image || 'https://images.unsplash.com/photo-1549399542-7e3f8b79c341?q=80&w=300&auto=format&fit=crop'} 
                        alt={listing.name} 
                        className="w-full h-full object-cover"
                    />
                    {listing.isVIP && (
                        <span className="absolute top-1.5 left-1.5 bg-brand-red text-white text-[9px] font-bold px-2 py-0.5 rounded shadow-sm uppercase tracking-wider">VIP</span>
                    )}
                </div>
                <div className="flex flex-col flex-1 min-w-0 justify-between py-0.5">
                    <div>
                        <h3 className="font-bold text-sm sm:text-base text-brand-navy truncate">{listing.name}</h3>
                        <div className="flex flex-wrap items-center gap-1.5 mt-1 sm:mt-1.5 text-[11px] sm:text-xs text-gray-500 truncate">
                            <span className="font-bold text-brand-red">{listing.category || 'Araç'}</span>
                            <span className="text-gray-300">•</span>
                            <span className="truncate"><i className="fa-solid fa-location-dot mr-1 opacity-70"></i>{listing.location || 'Silopi, Merkez'}</span>
                        </div>
                    </div>
                    <div className="flex items-end justify-between mt-2 sm:mt-4">
                        <span className="font-black text-brand-navy text-[15px] sm:text-lg leading-none">{listing.price ? `${listing.price} TL` : 'Fiyat Sorun'}</span>
                        <span className="text-[10px] text-gray-400 font-medium">{listing.date || 'Bugün'}</span>
                    </div>
                </div>
            </div>
        );
    }

    // --- ANA UYGULAMA BİLEŞENİ ---
    function App() {
        const [view, setView] = useState('home');
        const [user, setUser] = useState(null);
        const [vehicles, setVehicles] = useState([]);
        const [settings, setSettings] = useState({ phone: '0544 518 73 99', whatsapp: '0544 518 73 99' });
        const [loading, setLoading] = useState(true);

        const [loginEmail, setLoginEmail] = useState('');
        const [loginPassword, setLoginPassword] = useState('');
        const [loginError, setLoginError] = useState('');

        // Admin İlan Ekleme State'leri
        const [editingVehicle, setEditingVehicle] = useState(null);
        const [vehName, setVehName] = useState('');
        const [vehCategory, setVehCategory] = useState('Araç');
        const [vehPrice, setVehPrice] = useState('');
        const [vehLocation, setVehLocation] = useState('Silopi, Merkez');
        const [vehDesc, setVehDesc] = useState('');
        const [vehImg, setVehImg] = useState('');
        const [vehFile, setVehFile] = useState(null);
        const [vehVIP, setVehVIP] = useState(false);
        const [uploading, setUploading] = useState(false);

        useEffect(() => {
            const handleHashChange = () => {
                if (window.location.hash === '#/admin') {
                    if (user) setView('admin-panel');
                    else setView('admin-login');
                } else {
                    setView('home');
                }
            };
            window.addEventListener('hashchange', handleHashChange);
            handleHashChange();
            return () => window.removeEventListener('hashchange', handleHashChange);
        }, [user]);

        useEffect(() => {
            const check = setInterval(() => {
                if (window.FirebaseBridge) {
                    clearInterval(check);
                    const { auth, db, onAuthStateChanged, collection, onSnapshot, doc } = window.FirebaseBridge;

                    onAuthStateChanged(auth, (u) => {
                        if (u && u.email.includes('@admin')) {
                            setUser(u);
                            if (window.location.hash === '#/admin') setView('admin-panel');
                        } else {
                            setUser(null);
                            if (window.location.hash === '#/admin') setView('admin-login');
                        }
                    });

                    onSnapshot(collection(db, "vehicles"), (snap) => {
                        const list = [];
                        snap.forEach(d => list.push({ id: d.id, ...d.data() }));
                        setVehicles(list);
                    });

                    onSnapshot(doc(db, "settings", "contact"), (d) => {
                        if (d.exists()) setSettings(d.data());
                    });

                    setLoading(false);
                }
            }, 100);
        }, []);

        const handleVehFileChange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setVehFile(file);
            const reader = new FileReader();
            reader.onloadend = () => setVehImg(reader.result);
            reader.readAsDataURL(file);
        };

        const handleLogin = async (e) => {
            e.preventDefault();
            setLoginError('');
            try {
                const { auth, signInWithEmailAndPassword } = window.FirebaseBridge;
                await signInWithEmailAndPassword(auth, loginEmail.trim().toLowerCase(), loginPassword);
            } catch (err) {
                setLoginError('Hatalı e-posta veya şifre.');
            }
        };

        const handleLogout = async () => {
            const { auth, signOut } = window.FirebaseBridge;
            await signOut(auth);
            window.location.hash = '';
            setView('home');
        };

        const saveVehicle = async (e) => {
            e.preventDefault();
            if (!vehFile && !editingVehicle?.image && !vehImg) {
                alert('Lütfen ilan için bir fotoğraf yükleyin!');
                return;
            }
            setUploading(true);
            try {
                const { db, collection, addDoc, doc, updateDoc } = window.FirebaseBridge;
                let imageUrl = vehImg || editingVehicle?.image || '';

                const data = { 
                    name: vehName, 
                    category: vehCategory,
                    price: vehPrice,
                    location: vehLocation,
                    image: imageUrl, 
                    description: vehDesc,
                    isVIP: vehVIP
                };

                if (editingVehicle) {
                    await updateDoc(doc(db, "vehicles", editingVehicle.id), data);
                    setEditingVehicle(null);
                } else {
                    await addDoc(collection(db, "vehicles"), data);
                }
                setVehName(''); setVehCategory('Araç'); setVehPrice(''); setVehLocation('Silopi, Merkez'); setVehImg(''); setVehDesc(''); setVehFile(null); setVehVIP(false);
            } catch (err) {
                console.error('İlan yükleme hatası:', err);
                alert('HATA: ' + err.message);
            }
            setUploading(false);
        };

        const deleteVehicle = async (id) => {
            if (confirm('Bu ilanı silmek istediğinize emin misiniz?')) {
                const { db, doc, deleteDoc } = window.FirebaseBridge;
                await deleteDoc(doc(db, "vehicles", id));
            }
        };

        const saveContact = async (e) => {
            e.preventDefault();
            const { db, doc, setDoc } = window.FirebaseBridge;
            await setDoc(doc(db, "settings", "contact"), settings);
            alert('Numaralar başarıyla güncellendi!');
        };

        const getCleanNumber = (num) => {
            let f = num.replace(/\s+/g, '');
            if (!f.startsWith('+') && !f.startsWith('00')) {
                if (f.startsWith('0')) f = '+90' + f.substring(1);
                else if (!f.startsWith('90')) f = '+90' + f;
                else f = '+' + f;
            }
            return f;
        };

        const cleanPhone = getCleanNumber(settings.phone);
        const cleanWhatsapp = getCleanNumber(settings.whatsapp).replace('+', '');

        if (loading) return (
            <div className="min-h-screen flex items-center justify-center bg-brand-bg">
                <div className="text-center">
                    <i className="fa-solid fa-circle-notch animate-spin text-3xl text-brand-red"></i>
                    <p className="font-montserrat tracking-widest text-xs mt-3 text-brand-navy">YÜKLENİYOR...</p>
                </div>
            </div>
        );

        // ── ADMİN GİRİŞ ──
        if (view === 'admin-login') {
            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-brand-bg">
                    <div className="w-full max-w-md bg-white rounded-2xl p-8 border border-gray-200 premium-shadow">
                        <h2 className="text-xl font-black font-montserrat text-center text-brand-navy tracking-wide mb-6">YÖNETİCİ GİRİŞİ</h2>
                        {loginError && <div className="bg-red-50 border border-red-200 text-brand-red p-3 rounded-xl text-xs text-center mb-4">{loginError}</div>}
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" required className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-sm" placeholder="E-Posta" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)}/>
                            <input type="password" required className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-sm" placeholder="Şifre" value={loginPassword} onChange={e=>setLoginPassword(e.target.value)}/>
                            <button type="submit" className="w-full bg-brand-navy text-white font-bold py-3.5 rounded-xl text-xs font-montserrat tracking-wider uppercase mobile-touch-active hover:bg-gray-800">GİRİŞ YAP</button>
                        </form>
                    </div>
                </div>
            );
        }

        // ── ADMİN PANELİ ──
        if (view === 'admin-panel') {
            return (
                <div className="min-h-screen flex flex-col pb-4 bg-brand-bg">
                    <header className="bg-white border-b border-gray-200 py-4 px-6 flex justify-between items-center premium-shadow sticky top-0 z-50">
                        <div>
                            <h1 className="text-base font-black font-montserrat text-brand-navy">ADMİN PANELİ</h1>
                            <p className="text-[11px] text-gray-500">{user?.email}</p>
                        </div>
                        <button onClick={handleLogout} className="bg-red-50 text-brand-red border border-red-200 text-xs font-bold px-4 py-2 rounded-xl hover:bg-red-100">ÇIKIŞ YAP</button>
                    </header>

                    <div className="flex-1 max-w-6xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6 mt-4">
                        {/* SOL - İLAN EKLEME FORMU */}
                        <div className="space-y-6 md:col-span-1">
                            <div className="bg-white rounded-2xl p-6 border border-gray-200 premium-shadow">
                                <h3 className="text-xs font-black font-montserrat text-brand-navy uppercase border-b border-gray-100 pb-3 mb-4">
                                    {editingVehicle ? 'İlanı Düzenle' : 'Yeni İlan Ekle'}
                                </h3>
                                <form onSubmit={saveVehicle} className="space-y-4">
                                    <input type="text" required className="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-4 py-2.5" placeholder="İlan Başlığı" value={vehName} onChange={e=>setVehName(e.target.value)}/>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <select className="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-3 py-2.5" value={vehCategory} onChange={e=>setVehCategory(e.target.value)}>
                                            <option value="Araç">Araç</option>
                                            <option value="Ev / Arsa">Ev / Arsa</option>
                                            <option value="Kiralık">Kiralık</option>
                                        </select>
                                        <input type="text" className="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-3 py-2.5" placeholder="Fiyat (Örn: 500.000)" value={vehPrice} onChange={e=>setVehPrice(e.target.value)}/>
                                    </div>
                                    
                                    <input type="text" className="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-4 py-2.5" placeholder="Konum (Örn: Silopi, Ofis Mah.)" value={vehLocation} onChange={e=>setVehLocation(e.target.value)}/>

                                    <div className="space-y-2">
                                        <label className="block text-[11px] text-gray-500 uppercase font-bold tracking-wider">İlan Fotoğrafı</label>
                                        <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-200 border-dashed rounded-xl cursor-pointer bg-gray-50 hover:border-brand-red transition-colors overflow-hidden p-1">
                                            {vehImg
                                                ? <img src={vehImg} className="w-full h-full object-cover rounded-lg"/>
                                                : <div className="flex flex-col items-center text-center">
                                                    <i className="fa-solid fa-image text-xl mb-1 text-gray-400"></i>
                                                    <p className="text-xs font-medium text-gray-600">Fotoğraf Seç</p>
                                                  </div>
                                            }
                                            <input type="file" accept="image/*" className="hidden" onChange={handleVehFileChange}/>
                                        </label>
                                        {vehFile && <p className="text-[10px] text-green-600 font-medium truncate">✓ {vehFile.name}</p>}
                                    </div>
                                    
                                    <textarea required rows="3" className="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-4 py-2.5" placeholder="İlan Detayları" value={vehDesc} onChange={e=>setVehDesc(e.target.value)}></textarea>
                                    
                                    <label className="flex items-center gap-2 cursor-pointer bg-gray-50 p-3 rounded-xl border border-gray-200">
                                        <input type="checkbox" checked={vehVIP} onChange={e=>setVehVIP(e.target.checked)} className="rounded text-brand-red focus:ring-brand-red"/>
                                        <span className="text-sm font-bold text-brand-navy">VIP İlan Yap (Üstte Çıkar)</span>
                                    </label>

                                    <button type="submit" disabled={uploading} className="w-full bg-brand-navy text-white text-xs font-bold py-3.5 rounded-xl uppercase tracking-wider mobile-touch-active hover:bg-gray-800 disabled:opacity-60">
                                        {uploading ? <span><i className="fa-solid fa-spinner animate-spin mr-2"></i>KAYDEDİLİYOR...</span> : 'İLAN KAYDET'}
                                    </button>
                                </form>
                            </div>
                        </div>

                        {/* SAĞ - İLAN LİSTESİ VE İLETİŞİM */}
                        <div className="md:col-span-2 space-y-6">
                            <div className="bg-white rounded-2xl p-6 border border-gray-200 premium-shadow">
                                <h3 className="text-xs font-black font-montserrat text-brand-navy uppercase border-b border-gray-100 pb-3 mb-4">Sistem İletişim Numaraları</h3>
                                <form onSubmit={saveContact} className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">Telefon</label>
                                        <input type="text" className="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-4 py-2.5" value={settings.phone} onChange={e=>setSettings({...settings,phone:e.target.value})}/>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">WhatsApp</label>
                                        <input type="text" className="w-full bg-gray-50 border border-gray-200 text-sm rounded-xl px-4 py-2.5" value={settings.whatsapp} onChange={e=>setSettings({...settings,whatsapp:e.target.value})}/>
                                    </div>
                                    <button type="submit" className="sm:col-span-2 bg-brand-red text-white text-xs font-bold py-3 px-4 rounded-xl uppercase hover:bg-red-700 mobile-touch-active">NUMARALARI GÜNCELLE</button>
                                </form>
                            </div>

                            <div className="bg-white rounded-2xl p-6 border border-gray-200 premium-shadow">
                                <h3 className="text-xs font-black font-montserrat text-brand-navy uppercase border-b border-gray-100 pb-3 mb-4">Kayıtlı İlanlar ({vehicles.length})</h3>
                                <div className="space-y-3 max-h-96 overflow-y-auto pr-2 no-scrollbar">
                                    {vehicles.map(v => (
                                        <div key={v.id} className="flex flex-col sm:flex-row sm:items-center gap-3 bg-gray-50 p-3 rounded-xl border border-gray-200">
                                            <img src={v.image} className="w-full sm:w-20 h-24 sm:h-14 object-cover rounded-lg bg-gray-200 shrink-0"/>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center gap-2">
                                                    {v.isVIP && <span className="bg-brand-red text-white text-[8px] font-bold px-1.5 py-0.5 rounded">VIP</span>}
                                                    <h4 className="text-sm font-bold text-brand-navy truncate">{v.name}</h4>
                                                </div>
                                                <p className="text-xs text-gray-500 mt-1">{v.price} TL • {v.category}</p>
                                            </div>
                                            <div className="flex items-center gap-2 sm:justify-end border-t border-gray-200 sm:border-t-0 pt-2 sm:pt-0">
                                                <button onClick={()=>{
                                                    setEditingVehicle(v); setVehName(v.name); setVehCategory(v.category || 'Araç'); setVehPrice(v.price || ''); setVehLocation(v.location || 'Silopi, Merkez'); setVehImg(v.image); setVehDesc(v.description); setVehVIP(v.isVIP || false); setVehFile(null);
                                                }} className="flex-1 sm:flex-none bg-white border border-gray-200 px-3 py-1.5 rounded-lg text-sm font-medium text-brand-navy hover:bg-gray-100">Düzenle</button>
                                                <button onClick={()=>deleteVehicle(v.id)} className="flex-1 sm:flex-none bg-red-50 border border-red-200 px-3 py-1.5 rounded-lg text-sm font-medium text-brand-red hover:bg-red-100">Sil</button>
                                            </div>
                                        </div>
                                    ))}
                                    {vehicles.length === 0 && <p className="text-xs text-gray-500 text-center py-4">Henüz ilan eklenmedi.</p>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ── ANA SAYFA ──
        return (
            <div className="min-h-screen flex flex-col pb-12 bg-brand-bg relative">
                <InstallButton />
